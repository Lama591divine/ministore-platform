stages:
  - test
  - integration

unit_tests:
  stage: test
  image: golang:1.24
  script:
    - go test ./...

integration_tests:
  stage: integration
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - apk add --no-cache docker-cli-compose bash
  script:
    - |
      printf "JWT_SECRET=%s\nMETRICS_TOKEN=%s\n" "$JWT_SECRET" "$METRICS_TOKEN" > .env
      docker compose -f docker/compose.yml -f docker/docker-compose.integration.yml up -d --build

    - |
      OUT="$(docker compose -f docker/compose.yml -f docker/docker-compose.integration.yml run --rm -e E2E_MODE=create e2e)"
      echo "$OUT"
      E2E_ORDER_ID="$(echo "$OUT" | sed -n 's/^E2E_ORDER_ID=//p' | tail -n1)"
      test -n "$E2E_ORDER_ID" || exit 1

    - docker compose -f docker/compose.yml -f docker/docker-compose.integration.yml restart order

    - docker compose -f docker/compose.yml -f docker/docker-compose.integration.yml run --rm -e E2E_MODE=verify -e E2E_ORDER_ID="$E2E_ORDER_ID" e2e

  after_script:
    - docker compose -f docker/compose.yml -f docker/docker-compose.integration.yml logs > compose.logs || true
    - docker compose -f docker/compose.yml -f docker/docker-compose.integration.yml down -v || true
  artifacts:
    when: always
    paths:
      - compose.logs